<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Precio Chino">
<meta name="theme-color" content="#111111">
<title>Precio Chino</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');

  :root {
    --bg: #111111;
    --bg2: #1a1a1a;
    --bg3: #222222;
    --border: #333333;
    --border2: #444444;
    --text: #f0f0f0;
    --text2: #888888;
    --text3: #555555;
    --accent: #c8ff57;
    --accent-dim: #8ab83a;
    --danger: #ff5757;
    --danger-dim: #7a2020;
    --info: #57b8ff;
    --success: #57ffb8;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* Header */
  .header {
    padding: 52px 20px 16px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .header-title { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; }
  .header-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .header-right { display: flex; gap: 8px; }

  /* Tab bar */
  .tabbar {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: rgba(17,17,17,0.95);
    backdrop-filter: blur(12px);
    border-top: 0.5px solid var(--border);
    display: flex;
    padding: 8px 0 max(8px, env(safe-area-inset-bottom));
    z-index: 100;
  }
  .tab-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 4px; background: none; border: none; cursor: pointer;
    color: var(--text3); font-family: var(--sans); font-size: 11px;
    padding: 6px 0; transition: color 0.15s;
  }
  .tab-btn.active { color: var(--accent); }
  .tab-btn svg { width: 22px; height: 22px; }

  /* Sections */
  .section { display: none; padding: 0 16px; }
  .section.active { display: block; }

  /* Cards */
  .card {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
  }
  .card-accent {
    border-color: var(--accent);
    border-width: 1px;
  }

  /* Scanner */
  .scanner-tap {
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    padding: 32px 20px;
    text-align: center;
    color: var(--text2);
    cursor: pointer;
    margin-bottom: 12px;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
  }
  .scanner-tap:active { background: var(--bg3); }
  .scanner-tap.scanning { border-color: var(--accent); border-style: solid; }
  .scanner-icon { font-size: 40px; margin-bottom: 10px; display: block; }
  .scanner-label { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .scanner-hint { font-size: 12px; }

  #video {
    display: none; width: 100%; border-radius: var(--radius);
    margin-bottom: 12px; background: #000;
    max-height: 220px; object-fit: cover;
  }
  #canvas { display: none; }

  /* Form */
  .form-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group { margin-bottom: 14px; }
  input[type="text"], input[type="number"], select, textarea {
    width: 100%; background: var(--bg3); border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm); padding: 11px 13px;
    font-size: 15px; color: var(--text); font-family: var(--sans);
    outline: none; transition: border-color 0.2s; -webkit-appearance: none;
  }
  input:focus, select:focus { border-color: var(--accent); }
  select { cursor: pointer; }
  select option { background: var(--bg3); }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Buttons */
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 13px 20px; border-radius: var(--radius-sm);
    font-size: 15px; font-weight: 500; font-family: var(--sans);
    border: none; cursor: pointer; transition: opacity 0.15s, transform 0.1s;
    width: 100%;
  }
  .btn:active { opacity: 0.8; transform: scale(0.98); }
  .btn-accent { background: var(--accent); color: #111; }
  .btn-ghost { background: var(--bg3); border: 0.5px solid var(--border2); color: var(--text); }
  .btn-danger { background: var(--danger-dim); color: var(--danger); border: 0.5px solid var(--danger); }
  .btn-sm { padding: 8px 14px; font-size: 13px; width: auto; }

  .btn-icon {
    background: none; border: none; cursor: pointer; color: var(--text2);
    padding: 6px; display: flex; align-items: center;
  }
  .btn-icon svg { width: 18px; height: 18px; }

  /* Product cards */
  .product-name { font-size: 15px; font-weight: 600; flex: 1; }
  .product-code { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-top: 2px; }
  .price-big { font-size: 26px; font-weight: 600; color: var(--accent); font-family: var(--mono); }
  .price-store { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .divider { border: none; border-top: 0.5px solid var(--border); margin: 12px 0; }

  /* Badges */
  .badge {
    display: inline-block; font-size: 11px; padding: 3px 9px;
    border-radius: 99px; font-family: var(--mono);
  }
  .badge-new { background: #2a2000; color: #ffcc44; border: 0.5px solid #ffcc44; }
  .badge-known { background: #002a15; color: var(--success); border: 0.5px solid var(--success); }

  /* Diff */
  .diff-up { color: var(--danger); font-size: 12px; font-family: var(--mono); }
  .diff-down { color: var(--success); font-size: 12px; font-family: var(--mono); }

  /* Comparison */
  .compare-winner {
    background: #1a2600; border: 1px solid var(--accent);
    border-radius: var(--radius); padding: 16px; margin-bottom: 10px;
  }
  .compare-winner-label { font-size: 11px; color: var(--accent-dim); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .compare-winner-store { font-size: 17px; font-weight: 600; }
  .compare-winner-price { font-size: 28px; font-weight: 600; color: var(--accent); font-family: var(--mono); }

  /* Empty */
  .empty { text-align: center; padding: 48px 20px; color: var(--text2); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; display: block; opacity: 0.4; }
  .empty-text { font-size: 15px; }
  .empty-hint { font-size: 13px; color: var(--text3); margin-top: 6px; }

  /* Overlay / Config */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.85); z-index: 200;
    flex-direction: column;
  }
  .overlay.open { display: flex; }
  .overlay-content {
    margin-top: auto; background: var(--bg2);
    border-radius: 24px 24px 0 0; padding: 20px 16px;
    padding-bottom: max(20px, env(safe-area-inset-bottom));
    max-height: 85vh; overflow-y: auto;
  }
  .overlay-handle { width: 40px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 16px; }
  .overlay-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: #111;
    padding: 10px 20px; border-radius: 99px;
    font-size: 14px; font-weight: 500;
    z-index: 300; opacity: 0;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  /* History list */
  .history-entry {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; border-bottom: 0.5px solid var(--border);
    font-size: 13px;
  }
  .history-entry:last-child { border-bottom: none; }
  .history-date { color: var(--text2); font-family: var(--mono); font-size: 11px; }
  .history-price { font-family: var(--mono); font-weight: 500; }

  /* Store tag */
  .store-tag {
    font-size: 11px; padding: 2px 8px; border-radius: 99px;
    background: var(--bg3); border: 0.5px solid var(--border2); color: var(--text2);
    display: inline-block;
  }

  a { color: var(--info); text-decoration: none; }
  .flex-between { display: flex; justify-content: space-between; align-items: center; }
  .flex-center { display: flex; align-items: center; gap: 10px; }
  .mt8 { margin-top: 8px; }
  .mt12 { margin-top: 12px; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div>
    <div class="header-title">🧾 Precio Chino</div>
    <div class="header-sub" id="header-sub">Cargando...</div>
  </div>
  <div class="header-right">
    <button class="btn-icon" onclick="openConfig()" aria-label="Configuración">
      <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg>
    </button>
  </div>
</div>

<!-- Tabs -->
<div id="section-scan" class="section active">
  <div class="scanner-tap" id="scanner-area" onclick="toggleScanner()">
    <span class="scanner-icon">📷</span>
    <div class="scanner-label">Escanear código de barras</div>
    <div class="scanner-hint">Tocá para activar la cámara</div>
  </div>
  <div id="zxing-container" style="display:none; margin-bottom:12px; border-radius:var(--radius); overflow:hidden; background:#000; min-height:240px; position:relative;">
    <video id="video" playsinline autoplay muted style="width:100%; height:240px; object-fit:cover; display:block;"></video>
    <button onclick="stopScanner()" style="position:absolute; bottom:12px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.7); color:#fff; border:1px solid rgba(255,255,255,0.3); border-radius:99px; padding:8px 20px; font-size:14px; cursor:pointer;">✕ Cerrar escáner</button>
  </div>
  <canvas id="canvas" style="display:none;"></canvas>

  <div id="scan-form" style="display:none;">
    <div class="card card-accent">
      <div class="flex-between" style="margin-bottom:14px;">
        <div>
          <div class="form-label">Código</div>
          <div style="font-family:var(--mono); font-size:13px;" id="display-barcode">—</div>
        </div>
        <span id="product-badge" class="badge badge-new">Nuevo</span>
      </div>

      <div class="form-group">
        <div class="form-label">Nombre del producto</div>
        <input type="text" id="input-name" placeholder="Ej: Leche La Serenísima 1L">
      </div>
      <div class="row2">
        <div class="form-group">
          <div class="form-label">Precio ($)</div>
          <input type="number" id="input-price" placeholder="0" min="0" step="1" inputmode="numeric">
        </div>
        <div class="form-group">
          <div class="form-label">Tienda</div>
          <select id="input-store"><option value="">Elegir...</option></select>
        </div>
      </div>
      <div class="form-group">
        <div class="form-label">Nota (opcional)</div>
        <input type="text" id="input-notes" placeholder="Ej: oferta, 3x2">
      </div>
      <button class="btn btn-accent" onclick="saveEntry()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
        Guardar registro
      </button>
      <button class="btn btn-ghost mt8" onclick="cancelForm()" style="margin-top:8px;">Cancelar</button>
    </div>
  </div>

  <div id="manual-section">
    <div class="card" style="margin-top:4px;">
      <div class="form-label" style="margin-bottom:8px;">Ingresar código manualmente</div>
      <div class="flex-center">
        <input type="text" id="manual-barcode" placeholder="7790315011014" inputmode="numeric" style="flex:1;">
        <button class="btn btn-ghost btn-sm" onclick="loadBarcode(document.getElementById('manual-barcode').value)" style="margin-left:8px;">Cargar</button>
      </div>
    </div>
  </div>
</div>

<div id="section-list" class="section">
  <div id="products-container"></div>
</div>

<div id="section-compare" class="section">
  <div class="form-group">
    <div class="form-label" style="margin-bottom:8px;">Seleccioná un producto</div>
    <select id="compare-select" onchange="renderCompare()">
      <option value="">— elegí un producto —</option>
    </select>
  </div>
  <div id="compare-output"></div>
</div>

<!-- Tab bar -->
<nav class="tabbar">
  <button class="tab-btn active" onclick="switchTab('scan', this)">
    <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 0 1 3.75 9.375v-4.5ZM3.75 14.625c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5a1.125 1.125 0 0 1-1.125-1.125v-4.5ZM13.5 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 0 1 13.5 9.375v-4.5Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 6.75h.75v.75h-.75v-.75ZM6.75 16.5h.75v.75h-.75v-.75ZM16.5 6.75h.75v.75h-.75v-.75ZM13.5 13.5h.75v.75h-.75v-.75ZM13.5 19.5h.75v.75h-.75v-.75ZM19.5 13.5h.75v.75h-.75v-.75ZM19.5 19.5h.75v.75h-.75v-.75ZM16.5 16.5h.75v.75h-.75v-.75Z"/></svg>
    Escanear
  </button>
  <button class="tab-btn" onclick="switchTab('list', this)">
    <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 6.75h12M8.25 12h12m-12 5.25h12M3.75 6.75h.007v.008H3.75V6.75Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0ZM3.75 12h.007v.008H3.75V12Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm-.375 5.25h.007v.008H3.75v-.008Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z"/></svg>
    Productos
  </button>
  <button class="tab-btn" onclick="switchTab('compare', this)">
    <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 14.25v2.25m3-4.5v4.5m3-6.75v6.75m3-9v9M6 20.25h12A2.25 2.25 0 0 0 20.25 18V6A2.25 2.25 0 0 0 18 3.75H6A2.25 2.25 0 0 0 3.75 6v12A2.25 2.25 0 0 0 6 20.25Z"/></svg>
    Comparar
  </button>
</nav>

<!-- Config overlay -->
<div class="overlay" id="config-overlay" onclick="closeConfigOnBg(event)">
  <div class="overlay-content">
    <div class="overlay-handle"></div>
    <div class="overlay-title">⚙️ Configuración</div>

    <div style="margin-bottom:20px;">
      <div class="form-label" style="margin-bottom:10px;">Tiendas guardadas</div>
      <div id="stores-list"></div>
      <div class="flex-center mt12">
        <input type="text" id="new-store-input" placeholder="Agregar tienda..." style="flex:1;">
        <button class="btn btn-ghost btn-sm" onclick="addStore()" style="margin-left:8px; white-space:nowrap;">+ Agregar</button>
      </div>
    </div>

    <div class="divider"></div>

    <div style="margin-top:16px;">
      <div class="form-label" style="margin-bottom:10px;">Datos</div>
      <button class="btn btn-ghost" onclick="exportData()" style="margin-bottom:8px;">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
        Exportar backup (JSON)
      </button>
      <button class="btn btn-danger" onclick="clearData()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"/></svg>
        Borrar todos los datos
      </button>
    </div>

    <button class="btn btn-ghost" onclick="closeConfig()" style="margin-top:16px;">Cerrar</button>
  </div>
</div>

<!-- History overlay -->
<div class="overlay" id="history-overlay" onclick="closeHistoryOnBg(event)">
  <div class="overlay-content">
    <div class="overlay-handle"></div>
    <div class="overlay-title" id="history-title">Historial</div>
    <div id="history-content"></div>
    <button class="btn btn-ghost" onclick="closeHistory()" style="margin-top:14px;">Cerrar</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
<script>
let DB = { products: {}, entries: [], stores: ['Chino cercano', 'Carrefour', 'Día', 'Coto', 'Jumbo'] };
let stream = null;
let scanning = false;
let scanInterval = null;
let currentCode = null;

function loadDB() {
  try {
    const s = localStorage.getItem('pc_db_v2');
    if (s) {
      const parsed = JSON.parse(s);
      DB = {
        products: parsed.products || {},
        entries: parsed.entries || [],
        stores: parsed.stores && parsed.stores.length ? parsed.stores : DB.stores
      };
    }
  } catch(e) {}
}

function saveDB() {
  try { localStorage.setItem('pc_db_v2', JSON.stringify(DB)); } catch(e) {}
}

function fmt(n) {
  return '$' + Number(n).toLocaleString('es-AR', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: '2-digit' });
}

function updateHeader() {
  const c = Object.keys(DB.products).length;
  document.getElementById('header-sub').textContent = c === 0 ? 'Sin productos aún' : c + ' producto' + (c !== 1 ? 's' : '') + ' registrado' + (c !== 1 ? 's' : '');
}

function switchTab(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('section-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'list') renderList();
  if (name === 'compare') renderCompareSelect();
  if (name !== 'scan') stopScanner();
}

// Scanner con ZXing (compatible iOS Safari)
let codeReader = null;

function toggleScanner() {
  if (document.getElementById('scan-form').style.display !== 'none') return;
  if (scanning) { stopScanner(); return; }
  const area = document.getElementById('scanner-area');

  if (typeof ZXing === 'undefined') {
    area.innerHTML = '<span class="scanner-icon">⚠️</span><div class="scanner-label">Librería no cargada</div><div class="scanner-hint">Revisá tu conexión a internet</div>';
    return;
  }

  area.innerHTML = '<span class="scanner-icon">⏳</span><div class="scanner-label">Iniciando cámara...</div><div class="scanner-hint">Tocá para cerrar</div>';
  area.classList.add('scanning');

  try {
    codeReader = new ZXing.BrowserMultiFormatReader();
    codeReader.decodeFromConstraints(
      { video: { facingMode: { ideal: 'environment' } } },
      'video',
      (result, err) => {
        if (result) {
          stopScanner();
          loadBarcode(result.getText());
        }
      }
    ).then(() => {
      scanning = true;
      document.getElementById('zxing-container').style.display = 'block';
      document.getElementById('scanner-area').style.display = 'none';
    }).catch(() => {
      area.innerHTML = '<span class="scanner-icon">🚫</span><div class="scanner-label">Sin acceso a cámara</div><div class="scanner-hint">Permitir acceso en Ajustes del iPhone</div>';
      area.classList.remove('scanning');
    });
  } catch(e) {
    area.innerHTML = '<span class="scanner-icon">⚠️</span><div class="scanner-label">Error al iniciar</div><div class="scanner-hint">Usá el ingreso manual</div>';
    area.classList.remove('scanning');
  }
}

function stopScanner() {
  if (codeReader) { try { codeReader.reset(); } catch(e) {} codeReader = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  scanning = false;
  clearInterval(scanInterval);
  document.getElementById('zxing-container').style.display = 'none';
  document.getElementById('scanner-area').style.display = 'block';
  const area = document.getElementById('scanner-area');
  area.classList.remove('scanning');
  area.innerHTML = '<span class="scanner-icon">📷</span><div class="scanner-label">Escanear código de barras</div><div class="scanner-hint">Tocá para activar la cámara</div>';
}

function loadBarcode(code) {
  code = (code || '').trim();
  if (!code) return;
  currentCode = code;
  document.getElementById('display-barcode').textContent = code;
  document.getElementById('scan-form').style.display = 'block';
  document.getElementById('manual-section').style.display = 'none';

  const existing = DB.products[code];
  const badge = document.getElementById('product-badge');
  if (existing) {
    document.getElementById('input-name').value = existing.name;
    badge.textContent = 'Conocido';
    badge.className = 'badge badge-known';
  } else {
    document.getElementById('input-name').value = '';
    badge.textContent = 'Nuevo';
    badge.className = 'badge badge-new';
  }
  document.getElementById('input-price').value = '';
  document.getElementById('input-notes').value = '';
  document.getElementById('input-store').value = '';
  document.getElementById('input-name').focus();
}

function cancelForm() {
  document.getElementById('scan-form').style.display = 'none';
  document.getElementById('manual-section').style.display = 'block';
  document.getElementById('manual-barcode').value = '';
  currentCode = null;
}

function saveEntry() {
  const code = currentCode;
  const name = document.getElementById('input-name').value.trim();
  const price = parseFloat(document.getElementById('input-price').value);
  const store = document.getElementById('input-store').value;
  const notes = document.getElementById('input-notes').value.trim();

  if (!name) { showToast('⚠️ Falta el nombre'); return; }
  if (!price || price <= 0) { showToast('⚠️ Precio inválido'); return; }
  if (!store) { showToast('⚠️ Elegí una tienda'); return; }

  DB.products[code] = { name, code };
  DB.entries.push({ code, name, price, store, notes, date: new Date().toISOString() });
  saveDB();
  updateHeader();
  cancelForm();
  showToast('✓ Guardado');
}

// List
function renderList() {
  const el = document.getElementById('products-container');
  const codes = Object.keys(DB.products);
  if (!codes.length) {
    el.innerHTML = '<div class="empty"><span class="empty-icon">📦</span><div class="empty-text">Sin productos todavía</div><div class="empty-hint">Empezá escaneando un producto en el chino</div></div>';
    return;
  }

  codes.sort((a, b) => {
    const ea = DB.entries.filter(e => e.code === a);
    const eb = DB.entries.filter(e => e.code === b);
    const da = ea.length ? Math.max(...ea.map(e => new Date(e.date))) : 0;
    const db2 = eb.length ? Math.max(...eb.map(e => new Date(e.date))) : 0;
    return db2 - da;
  });

  el.innerHTML = codes.map(code => {
    const p = DB.products[code];
    const pEntries = DB.entries.filter(e => e.code === code).sort((a, b) => new Date(b.date) - new Date(a.date));
    const last = pEntries[0];
    return `<div class="card">
      <div class="flex-between">
        <div style="flex:1; margin-right:10px;">
          <div class="product-name">${p.name}</div>
          <div class="product-code">${code}</div>
        </div>
        <button class="btn-icon" onclick="editProduct('${code}')" aria-label="Editar nombre">
          <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125"/></svg>
        </button>
      </div>
      <div class="divider"></div>
      ${last ? `<div class="flex-between">
        <div>
          <div class="price-big">${fmt(last.price)}</div>
          <div class="price-store">${last.store} · ${fmtDate(last.date)}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:12px; color:var(--text2);">${pEntries.length} registro${pEntries.length !== 1 ? 's' : ''}</div>
          ${pEntries.length > 1 ? `<button class="btn-icon" onclick="showHistory('${code}')" style="margin-top:4px; font-size:12px; color:var(--info);">ver historial</button>` : ''}
        </div>
      </div>` : '<div style="color:var(--text3); font-size:13px;">Sin precios aún</div>'}
    </div>`;
  }).join('');
}

function editProduct(code) {
  const p = DB.products[code];
  const newName = prompt('Nuevo nombre:', p.name);
  if (newName && newName.trim()) {
    DB.products[code].name = newName.trim();
    DB.entries.filter(e => e.code === code).forEach(e => e.name = newName.trim());
    saveDB();
    renderList();
    showToast('✓ Nombre actualizado');
  }
}

function showHistory(code) {
  const p = DB.products[code];
  const entries = DB.entries.filter(e => e.code === code).sort((a, b) => new Date(b.date) - new Date(a.date));
  document.getElementById('history-title').textContent = p.name;
  document.getElementById('history-content').innerHTML = entries.map(e => `
    <div class="history-entry">
      <div>
        <div class="history-date">${fmtDate(e.date)}</div>
        <div class="store-tag" style="margin-top:4px;">${e.store}</div>
        ${e.notes ? `<div style="font-size:11px; color:var(--text3); margin-top:3px;">${e.notes}</div>` : ''}
      </div>
      <div class="history-price">${fmt(e.price)}</div>
    </div>
  `).join('');
  document.getElementById('history-overlay').classList.add('open');
}

function closeHistory() { document.getElementById('history-overlay').classList.remove('open'); }
function closeHistoryOnBg(e) { if (e.target === document.getElementById('history-overlay')) closeHistory(); }

// Compare
function renderCompareSelect() {
  const sel = document.getElementById('compare-select');
  const codes = Object.keys(DB.products);
  sel.innerHTML = '<option value="">— elegí un producto —</option>' +
    codes.map(c => `<option value="${c}">${DB.products[c].name}</option>`).join('');
  document.getElementById('compare-output').innerHTML = '';
}

function renderCompare() {
  const code = document.getElementById('compare-select').value;
  const out = document.getElementById('compare-output');
  if (!code) { out.innerHTML = ''; return; }

  const entries = DB.entries.filter(e => e.code === code);
  if (!entries.length) { out.innerHTML = '<div class="empty"><span class="empty-icon">📊</span><div class="empty-text">Sin registros para este producto</div></div>'; return; }

  const byStore = {};
  entries.forEach(e => {
    if (!byStore[e.store]) byStore[e.store] = [];
    byStore[e.store].push(e);
  });

  const storesSummary = Object.entries(byStore).map(([store, es]) => {
    const sorted = es.sort((a, b) => new Date(b.date) - new Date(a.date));
    return { store, latest: sorted[0], all: sorted };
  }).sort((a, b) => a.latest.price - b.latest.price);

  const cheapest = storesSummary[0];
  const mostExpensive = storesSummary[storesSummary.length - 1];

  let winnerHtml = '';
  if (storesSummary.length > 1) {
    const diff = ((mostExpensive.latest.price - cheapest.latest.price) / cheapest.latest.price * 100).toFixed(1);
    winnerHtml = `<div class="compare-winner">
      <div class="compare-winner-label">Más barato ahora</div>
      <div class="compare-winner-store">${cheapest.store}</div>
      <div class="compare-winner-price">${fmt(cheapest.latest.price)}</div>
      <div style="font-size:12px; color:var(--accent-dim); margin-top:4px;">${diff}% más barato que ${mostExpensive.store}</div>
    </div>`;
  }

  const storeCards = storesSummary.map(({ store, latest, all }) => {
    const prev = all[1];
    let diffHtml = '';
    if (prev) {
      const pct = ((latest.price - prev.price) / prev.price * 100);
      const sign = pct >= 0 ? '+' : '';
      diffHtml = `<span class="${pct >= 0 ? 'diff-up' : 'diff-down'}">${sign}${pct.toFixed(1)}% vs anterior</span>`;
    }

    const historyRows = all.map(e => `
      <div class="history-entry">
        <div>
          <div class="history-date">${fmtDate(e.date)}</div>
          ${e.notes ? `<div style="font-size:11px;color:var(--text3);">${e.notes}</div>` : ''}
        </div>
        <div class="history-price">${fmt(e.price)}</div>
      </div>
    `).join('');

    return `<div class="card">
      <div class="flex-between" style="margin-bottom:6px;">
        <div style="font-weight:600;">${store}</div>
        ${diffHtml}
      </div>
      <div class="price-big">${fmt(latest.price)}</div>
      <div class="price-store">${fmtDate(latest.date)}</div>
      ${all.length > 1 ? `<div class="divider"></div>${historyRows}` : ''}
    </div>`;
  }).join('');

  out.innerHTML = winnerHtml + storeCards;
}

// Config
function openConfig() {
  renderStores();
  renderStoreSelect();
  document.getElementById('config-overlay').classList.add('open');
}
function closeConfig() { document.getElementById('config-overlay').classList.remove('open'); }
function closeConfigOnBg(e) { if (e.target === document.getElementById('config-overlay')) closeConfig(); }

function renderStores() {
  document.getElementById('stores-list').innerHTML = DB.stores.map((s, i) => `
    <div class="flex-between" style="padding:8px 0; border-bottom:0.5px solid var(--border);">
      <span style="font-size:14px;">${s}</span>
      <button class="btn-icon" onclick="removeStore(${i})" aria-label="Eliminar">
        <svg width="16" height="16" fill="none" stroke="var(--danger)" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"/></svg>
      </button>
    </div>
  `).join('');
}

function renderStoreSelect() {
  const sel = document.getElementById('input-store');
  sel.innerHTML = '<option value="">Elegir...</option>' + DB.stores.map(s => `<option value="${s}">${s}</option>`).join('');
}

function addStore() {
  const val = document.getElementById('new-store-input').value.trim();
  if (!val) return;
  if (DB.stores.includes(val)) { showToast('⚠️ Ya existe'); return; }
  DB.stores.push(val);
  saveDB();
  document.getElementById('new-store-input').value = '';
  renderStores();
  renderStoreSelect();
  showToast('✓ Tienda agregada');
}

function removeStore(i) {
  if (!confirm('¿Eliminar "' + DB.stores[i] + '"?')) return;
  DB.stores.splice(i, 1);
  saveDB();
  renderStores();
  renderStoreSelect();
}

function exportData() {
  const blob = new Blob([JSON.stringify(DB, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'precio_chino_backup_' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function clearData() {
  if (!confirm('¿Borrar TODOS los datos? No se puede deshacer.')) return;
  DB = { products: {}, entries: [], stores: ['Chino cercano', 'Carrefour', 'Día', 'Coto', 'Jumbo'] };
  saveDB();
  updateHeader();
  renderStoreSelect();
  closeConfig();
  showToast('✓ Datos eliminados');
}

// Toast
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// Init
loadDB();
updateHeader();
renderStoreSelect();
</script>
</body>
</html>
